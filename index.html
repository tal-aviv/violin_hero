<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/violin_hero/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="violin_hero">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>violin_hero</title>
  <link rel="manifest" href="manifest.json">
</head>
<body style="touch-action: none; -ms-touch-action: none; overflow: hidden; height: 100%; margin: 0;">
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>

  <!-- PWA Install Banner -->
  <div id="pwa-banner" style="
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 99999;
    background: #fff; border-top: 1px solid #e0e0e0;
    padding: 12px 16px; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.10);
  ">
    <div style="display: flex; align-items: center; gap: 12px; max-width: 480px; margin: 0 auto;">
      <img src="icons/Icon-192.png" style="width: 40px; height: 40px; border-radius: 8px;" />
      <div style="flex: 1; min-width: 0;">
        <div style="font-weight: 700; font-size: 14px; color: #222;">Install Violin Hero</div>
        <div id="pwa-subtitle" style="font-size: 12px; color: #666; margin-top: 2px;">Add to home screen for the best experience</div>
      </div>
      <button id="pwa-action" style="
        background: #6E7BFF; color: #fff; border: none; border-radius: 8px;
        padding: 8px 16px; font-weight: 700; font-size: 13px; cursor: pointer; white-space: nowrap;
      ">Install</button>
      <button id="pwa-close" style="
        background: none; border: none; font-size: 20px; color: #999; cursor: pointer; padding: 4px 8px;
      ">&times;</button>
    </div>
  </div>

  <script>
  (function() {
    var banner = document.getElementById('pwa-banner');
    var actionBtn = document.getElementById('pwa-action');
    var closeBtn = document.getElementById('pwa-close');
    var subtitle = document.getElementById('pwa-subtitle');

    // Don't show if already installed as PWA or dismissed recently
    if (window.matchMedia('(display-mode: standalone)').matches) return;
    if (window.navigator.standalone === true) return;
    if (sessionStorage.getItem('pwa-dismissed')) return;

    var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ||
                   (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    if (!isMobile) return;

    var deferredPrompt = null;
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    // Android: capture the install prompt
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      banner.style.display = 'block';
    });

    // iOS: show instructions after a short delay
    if (isIOS) {
      setTimeout(function() {
        subtitle.textContent = 'Tap the share button ⎋ then "Add to Home Screen"';
        actionBtn.textContent = 'Got it';
        banner.style.display = 'block';
      }, 2000);
    }

    actionBtn.addEventListener('click', function() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(choice) {
          deferredPrompt = null;
          if (choice.outcome === 'accepted') return;
          banner.style.display = 'none';
        });
      } else {
        banner.style.display = 'none';
      }
    });

    closeBtn.addEventListener('click', function() {
      banner.style.display = 'none';
      sessionStorage.setItem('pwa-dismissed', '1');
    });

    window.addEventListener('appinstalled', function() {
      subtitle.textContent = 'Installed! Find Violin Hero on your home screen.';
      actionBtn.textContent = 'Open App';
      closeBtn.style.display = 'none';
      actionBtn.onclick = function() {
        window.location.reload();
      };
    });
  })();
  </script>
</body>
</html>
